<div class="bg-white rounded-xl border border-planora-desert-200 p-5 shadow-sm space-y-3 mb-4">
  <div class="flex items-start justify-between">
    <div>
      <h3 class="text-xs font-bold uppercase tracking-wider text-planora-basalt-600">
        Borehole Plan
      </h3>
      <div class="text-2xl font-bold text-planora-basalt-800 mt-1">{{ minRequired }} min</div>
      <div class="text-sm text-planora-basalt-400">
        Recommended: {{ recommended }} for {{ coveragePercent }}% coverage
      </div>
    </div>
    <!-- Coverage gauge -->
    <div class="relative w-16 h-16">
      <svg viewBox="0 0 36 36" class="w-full h-full">
        <circle cx="18" cy="18" r="15.915" fill="none" stroke="#e5e7eb" stroke-width="4" />
        <circle
          cx="18"
          cy="18"
          r="15.915"
          fill="none"
          [attr.stroke]="coverageColor"
          stroke-width="4"
          stroke-linecap="round"
          [attr.stroke-dasharray]="coverageDashArray"
          transform="rotate(-90 18 18)"
        />
      </svg>
      <span
        class="absolute inset-0 flex items-center justify-center text-sm font-bold text-planora-basalt-800"
        >{{ coveragePercent }}%</span
      >
    </div>
  </div>
  <div class="flex items-center gap-2 text-xs text-planora-basalt-500">
    <span class="px-2 py-0.5 bg-planora-limestone rounded-full">{{ gridSize }}</span>
    <span class="px-2 py-0.5 bg-planora-limestone rounded-full">{{ strategy }}</span>
  </div>
</div>
