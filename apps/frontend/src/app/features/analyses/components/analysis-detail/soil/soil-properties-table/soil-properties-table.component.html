<div class="overflow-hidden rounded-lg border border-planora-desert-200 bg-white shadow-sm">
  <table class="w-full text-sm">
    <thead class="bg-planora-desert-50">
      <tr>
        <th class="px-4 py-2 text-left text-[10px] font-bold uppercase">Property</th>
        <th class="px-4 py-2 text-right text-[10px] font-bold uppercase">Value</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-planora-desert-100">
      <tr>
        <td class="px-4 py-2 text-planora-basalt-600">Bulk Density</td>
        <td class="px-4 py-2 text-right font-mono font-bold">{{ bulkDensity }} g/cm³</td>
      </tr>
      <tr>
        <td class="px-4 py-2 text-planora-basalt-600">Organic Carbon</td>
        <td class="px-4 py-2 text-right font-mono font-bold">{{ organicCarbon }}%</td>
      </tr>
      <tr>
        <td class="px-4 py-2 text-planora-basalt-600">pH Value</td>
        <td class="px-4 py-2 text-right font-mono font-bold">{{ pH }}</td>
      </tr>
    </tbody>
  </table>
</div>
