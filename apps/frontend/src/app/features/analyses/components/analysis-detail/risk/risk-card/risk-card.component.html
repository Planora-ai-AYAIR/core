<details
  class="bg-white rounded-xl border border-planora-desert-200 shadow-sm hover:shadow transition-shadow duration-200 group/card"
>
  <summary class="p-5 cursor-pointer flex items-start gap-4 select-none list-none">
    <!-- Icon / Emoji -->
    <div
      class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
      [style.background-color]="risk.color + '18'"
      [style.color]="risk.color"
    >
      @if (risk.icon.startsWith('pi')) {
        <i class="text-lg" [class]="risk.icon"></i>
      } @else {
        <span class="text-lg">{{ risk.icon }}</span>
      }
    </div>

    <!-- Title + level -->
    <div class="flex-1 min-w-0">
      <div class="text-sm font-bold text-planora-basalt-800 leading-tight">{{ label }}</div>
      <div class="text-xs text-planora-basalt-400 mt-0.5">{{ risk.level }} risk</div>
    </div>

    <!-- Score -->
    <div class="text-right shrink-0 ml-2">
      <div class="text-xl font-bold leading-none" [style.color]="risk.color">{{ risk.score }}</div>
      <div class="text-[10px] text-planora-basalt-400 mt-0.5">/100</div>
    </div>

    <!-- Chevron -->
    <i
      class="pi pi-chevron-down text-xs text-planora-basalt-400 transition-transform duration-200 group-open/card:rotate-180 shrink-0 self-center risk-card-chevron"
    ></i>
  </summary>

  <div class="px-5 pb-5 space-y-3 border-t border-planora-desert-100 pt-4">
    <!-- Color bar -->
    <div class="h-2.5 rounded-full bg-planora-desert-100 overflow-hidden">
      <div
        class="h-full rounded-full transition-all duration-500"
        [style.width.%]="risk.score"
        [style.background-color]="risk.color"
      ></div>
    </div>

    <!-- Factors -->
    @for (f of risk.factors; track f.label) {
      <div class="flex justify-between items-baseline gap-4 text-xs">
        <span class="text-planora-basalt-600 font-medium">{{ f.label }}</span>
        <span class="text-planora-basalt-500 text-right leading-relaxed">{{ f.detail }}</span>
      </div>
    }

    <!-- Mitigation -->
    @if (risk.mitigation) {
      <div
        class="text-xs text-planora-basalt-500 italic bg-planora-limestone p-2.5 rounded-lg leading-relaxed"
      >
        💡 {{ risk.mitigation }}
      </div>
    }
  </div>
</details>
