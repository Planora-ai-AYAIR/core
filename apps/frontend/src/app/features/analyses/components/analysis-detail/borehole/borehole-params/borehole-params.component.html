<div class="bg-white rounded-xl border border-planora-desert-200 p-5 shadow-sm space-y-4 mb-4">
  <h3 class="text-xs font-bold uppercase tracking-wider text-planora-basalt-600">
    Customize Parameters
  </h3>
  <div class="space-y-2">
    <div class="flex justify-between text-xs">
      <span>Max spacing (m)</span>
      <input
        type="number"
        [ngModel]="params.maxSpacing"
        (ngModelChange)="update('maxSpacing', $event)"
        min="10"
        max="100"
        class="w-16 px-1 py-0.5 border rounded text-right text-xs"
      />
    </div>
    <div class="flex justify-between text-xs">
      <span>Min boreholes</span>
      <input
        type="number"
        [ngModel]="params.minBoreholes"
        (ngModelChange)="update('minBoreholes', $event)"
        min="5"
        max="50"
        class="w-16 px-1 py-0.5 border rounded text-right text-xs"
      />
    </div>
    <div class="flex justify-between text-xs">
      <span>Target depth (m)</span>
      <input
        type="number"
        [ngModel]="params.targetDepth"
        (ngModelChange)="update('targetDepth', $event)"
        min="10"
        max="50"
        class="w-16 px-1 py-0.5 border rounded text-right text-xs"
      />
    </div>
    <div class="flex items-center gap-2 text-xs">
      <span>Unit</span>
      <select
        [ngModel]="params.unit"
        (ngModelChange)="update('unit', $event)"
        class="px-2 py-0.5 border rounded text-xs"
      >
        <option value="m">Meters</option>
        <option value="ft">Feet</option>
      </select>
    </div>
  </div>
  <button
    (click)="recalculate.emit()"
    class="w-full py-2 bg-planora-clay-500 text-white text-xs font-bold rounded-lg hover:bg-planora-clay-600"
  >
    Recalculate
  </button>
</div>
