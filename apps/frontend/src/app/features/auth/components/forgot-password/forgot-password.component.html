<form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="space-y-6">
  <!-- Heading group -->
  <div class="text-center">
    <h1 class="font-display text-3xl font-bold text-planora-basalt-900">Forgot Password</h1>
    <p class="text-sm text-planora-basalt-500 mt-1">We'll send you a code to reset your password</p>
  </div>

  <!-- Method toggle -->
  <div class="flex rounded-lg border border-planora-desert-300 p-1 text-sm font-medium">
    <button
      type="button"
      (click)="setMethod('email')"
      [class.bg-planora-clay-500]="method === 'email'"
      [class.text-white]="method === 'email'"
      class="flex-1 rounded-md py-1.5 transition-colors"
    >
      Email
    </button>
    <button
      type="button"
      (click)="setMethod('phone')"
      [class.bg-planora-clay-500]="method === 'phone'"
      [class.text-white]="method === 'phone'"
      class="flex-1 rounded-md py-1.5 transition-colors"
    >
      Phone
    </button>
  </div>

  <!-- Form fields -->
  <div class="space-y-5">
    @if (method === 'email') {
      <app-input
        formControlName="email"
        type="email"
        placeholder="Email address"
        [showError]="
          (forgotPasswordForm.get('email')?.touched || false) &&
          (forgotPasswordForm.get('email')?.invalid || false)
        "
        [errorMessage]="getErrorMessage('email')"
      ></app-input>
    } @else {
      <app-input
        formControlName="phoneNumber"
        type="text"
        placeholder="Phone number"
        [showError]="
          (forgotPasswordForm.get('phoneNumber')?.touched || false) &&
          (forgotPasswordForm.get('phoneNumber')?.invalid || false)
        "
        [errorMessage]="getErrorMessage('phoneNumber')"
      ></app-input>
    }
  </div>

  <!-- Submit button -->
  <app-button
    type="submit"
    variant="primary"
    [fullWidth]="true"
    [disabled]="forgotPasswordForm.invalid"
    [isLoading]="isLoading()"
    loadingText="Sending..."
    class="mt-2"
  >
    Send Reset Code
  </app-button>

  <!-- Back to sign-in -->
  <p class="text-center text-sm text-planora-basalt-500 mt-6">
    Remembered your password?
    <a
      [routerLink]="[ROUTES.signIn]"
      class="text-planora-clay-600 hover:text-planora-clay-500 font-semibold transition-colors"
    >
      Sign in
    </a>
  </p>
</form>
