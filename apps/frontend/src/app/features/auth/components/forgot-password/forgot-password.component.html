<form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="space-y-6">
  <!-- Heading -->
  <div class="text-center">
    <h1 class="font-display text-3xl font-bold text-planora-basalt-900">Forgot Password</h1>
    <p class="text-sm text-planora-basalt-500 mt-1">
      Enter your email and we'll send you a one-time code
    </p>
  </div>

  <!-- Email field -->
  <div class="space-y-5">
    <app-input
      formControlName="email"
      type="email"
      placeholder="Email address"
      [showError]="
        forgotPasswordForm.get('email')!.touched && forgotPasswordForm.get('email')!.invalid
      "
      [errorMessage]="getErrorMessage('email')"
    ></app-input>
  </div>

  <!-- Submit button -->
  <app-button
    type="submit"
    variant="primary"
    [fullWidth]="true"
    [disabled]="forgotPasswordForm.invalid"
    [isLoading]="isLoading"
    loadingText="Sending OTP..."
  >
    Send OTP
    <i class="pi pi-mobile ml-2"></i>
  </app-button>

  <!-- Sign-in link -->
  <p class="text-center text-sm text-planora-basalt-500 mt-6">
    Remember your password?
    <a
      [routerLink]="[ROUTES.signIn]"
      class="text-planora-clay-600 hover:text-planora-clay-500 font-semibold transition-colors"
    >
      Sign in
    </a>
  </p>
</form>
