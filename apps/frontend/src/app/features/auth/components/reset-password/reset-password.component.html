<form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" class="space-y-6">
  <!-- Heading group -->
  <div class="text-center">
    <h1 class="font-display text-3xl font-bold text-planora-basalt-900">Reset Password</h1>
    <p class="text-sm text-planora-basalt-500 mt-1">
      Enter the code we sent you and choose a new password
    </p>
  </div>

  <!-- Form fields -->
  <div class="space-y-5">
    <app-input
      formControlName="otp"
      type="text"
      placeholder="6-digit code"
      [showError]="
        (resetPasswordForm.get('otp')?.touched || false) &&
        (resetPasswordForm.get('otp')?.invalid || false)
      "
      [errorMessage]="getErrorMessage('otp')"
    ></app-input>

    <app-input
      formControlName="newPassword"
      type="password"
      placeholder="New password (8+ chars, upper, lower, number, symbol)"
      [showError]="
        (resetPasswordForm.get('newPassword')?.touched || false) &&
        (resetPasswordForm.get('newPassword')?.invalid || false)
      "
      [errorMessage]="getErrorMessage('newPassword')"
    ></app-input>

    <app-input
      formControlName="confirmPassword"
      type="password"
      placeholder="Confirm new password"
      [showError]="
        (resetPasswordForm.get('confirmPassword')?.touched &&
          resetPasswordForm.get('confirmPassword')?.invalid) ||
        formHasMismatch
      "
      [errorMessage]="formHasMismatch ? 'Passwords do not match' : getErrorMessage('confirmPassword')"
    ></app-input>
  </div>

  <!-- Submit button -->
  <app-button
    type="submit"
    variant="primary"
    [fullWidth]="true"
    [disabled]="resetPasswordForm.invalid"
    [isLoading]="isLoading()"
    loadingText="Resetting..."
    class="mt-2"
  >
    Reset Password
  </app-button>

  <p class="text-center text-sm text-planora-basalt-500 mt-6">
    <a
      [routerLink]="[ROUTES.signIn]"
      class="text-planora-clay-600 hover:text-planora-clay-500 font-semibold transition-colors"
    >
      Back to Sign In
    </a>
  </p>
</form>
