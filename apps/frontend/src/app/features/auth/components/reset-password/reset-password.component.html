<form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="space-y-6">
  <!-- Heading -->
  <div class="text-center">
    <h1 class="font-display text-3xl font-bold text-planora-basalt-900">Reset Password</h1>
    <p class="text-sm text-planora-basalt-500 mt-1">
      Choose a new password for <strong>{{ email }}</strong>
    </p>
  </div>

  <!-- Form fields -->
  <div class="space-y-5">
    <!-- New Password -->
    <app-input
      formControlName="password"
      type="password"
      placeholder="New password (8+ chars, upper, lower, number, symbol)"
      [showError]="resetForm.get('password')!.touched && resetForm.get('password')!.invalid"
      [errorMessage]="getErrorMessage('password')"
    ></app-input>

    <!-- Confirm Password -->
    <div>
      <app-input
        formControlName="confirmPassword"
        type="password"
        placeholder="Confirm new password"
        [showError]="
          (resetForm.get('confirmPassword')!.touched &&
            resetForm.get('confirmPassword')!.invalid) ||
          formHasMismatch
        "
        [errorMessage]="
          formHasMismatch ? 'Passwords do not match' : getErrorMessage('confirmPassword')
        "
      ></app-input>
    </div>
  </div>

  <!-- Submit -->
  <app-button
    type="submit"
    variant="primary"
    [fullWidth]="true"
    [disabled]="resetForm.invalid"
    [isLoading]="isLoading"
    loadingText="Resetting password..."
  >
    Reset Password
    <i class="pi pi-lock ml-2"></i>
  </app-button>

  <!-- Sign-in link -->
  <p class="text-center text-sm text-planora-basalt-500 mt-6">
    Remember your password?
    <a
      [routerLink]="[ROUTES.signIn]"
      class="text-planora-clay-600 hover:text-planora-clay-500 font-semibold transition-colors"
    >
      Sign in
    </a>
  </p>
</form>
