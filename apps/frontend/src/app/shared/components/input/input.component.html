<div class="w-full">
  <!-- Label -->
  @if (label()) {
    <label
      [for]="id()"
      [id]="id() + '-label'"
      class="block text-sm font-medium text-planora-basalt-600 mb-2"
    >
      {{ label() }}
    </label>
  }

  <!-- Input container -->
  <div class="relative">
    <input
      #inputEl
      [type]="currentInputType()"
      [placeholder]="placeholder() || ' '"
      [value]="value()"
      [name]="name()"
      [id]="id()"
      [disabled]="isDisabled()"
      [class]="inputClasses()"
      [title]="label() || placeholder() || 'Input field'"
      [attr.aria-labelledby]="label() ? id() + '-label' : null"
      [attr.aria-label]="!label() ? placeholder() || 'Input field' : null"
      [attr.aria-describedby]="
        shouldShowError() ? id() + '-error' : helperText() ? id() + '-helper' : null
      "
      [attr.aria-invalid]="shouldShowError()"
      (input)="onInput($event)"
      (blur)="onBlur()"
      (focus)="onFocus()"
    />

    <!-- Password toggle -->
    @if (isPasswordField()) {
      <button
        type="button"
        class="absolute right-4 top-1/2 -translate-y-1/2 bg-transparent border-0 cursor-pointer text-planora-basalt-400 p-1 flex items-center justify-center hover:text-planora-clay-500 transition-colors duration-200"
        (click)="togglePassword()"
        [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
        [attr.title]="showPassword() ? 'Hide password' : 'Show password'"
        [disabled]="isDisabled()"
      >
        <span class="sr-only">{{ showPassword() ? 'Hide password' : 'Show password' }}</span>
        <i
          [class]="showPassword() ? 'pi pi-eye w-5 h-5' : 'pi pi-eye-slash w-5 h-5'"
          aria-hidden="true"
        ></i>
      </button>
    }

    <!-- Suffix icon (e.g., search) -->
    @if (suffixIcon() && !isPasswordField()) {
      <button
        type="button"
        class="absolute right-4 top-1/2 -translate-y-1/2 bg-transparent border-0 cursor-pointer text-planora-basalt-400 p-1 flex items-center justify-center hover:text-planora-clay-500 transition-colors duration-200"
        (click)="onSuffixIconClick()"
        [attr.aria-label]="suffixIconAriaLabel() || 'Toggle'"
        [attr.title]="suffixIconAriaLabel() || 'Toggle'"
        [disabled]="isDisabled()"
      >
        <span class="sr-only">{{ suffixIconAriaLabel() || 'Toggle' }}</span>
        <i [class]="suffixIcon() + ' w-5 h-5'" aria-hidden="true"></i>
      </button>
    }

    <!-- Date picker icon -->
    @if (isDateField() && !isPasswordField() && !suffixIcon()) {
      <button
        type="button"
        class="absolute right-4 top-1/2 -translate-y-1/2 bg-transparent border-0 cursor-pointer text-planora-basalt-400 p-1 flex items-center justify-center hover:text-planora-clay-500 transition-colors duration-200"
        (click)="openDatePicker()"
        [disabled]="isDisabled()"
        aria-label="Open calendar"
      >
        <i class="pi pi-calendar w-5 h-5" aria-hidden="true"></i>
      </button>
    }
  </div>

  <!-- Error message -->
  <span
    [id]="id() + '-error'"
    class="error-message"
    [class.error-visible]="shouldShowError() && errorMessage()"
    role="alert"
  >
    {{ errorMessage() }}
  </span>

  <!-- Helper text -->
  <span
    [id]="id() + '-helper'"
    class="helper-message"
    [class.helper-visible]="!shouldShowError() && helperText()"
  >
    {{ helperText() }}
  </span>
</div>
