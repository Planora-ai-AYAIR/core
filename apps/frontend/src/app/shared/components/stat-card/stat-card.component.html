<div
  class="kpi-card bg-white border border-planora-desert-200 p-5 rounded-2xl flex items-center gap-4 shadow-sm"
>
  <div class="w-11 h-11 rounded-xl flex items-center justify-center" [ngClass]="iconBgClass">
    <i class="pi text-lg" [ngClass]="[icon, iconTextClass]"></i>
  </div>
  <div>
    <p class="text-[10px] font-bold text-planora-basalt-400 uppercase tracking-wider">
      {{ label }}
    </p>
    <p class="text-xl font-bold text-planora-basalt-900">{{ value }}</p>
  </div>
</div>
