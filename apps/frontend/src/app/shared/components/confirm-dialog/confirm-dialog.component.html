@if (visible) {
  <div class="absolute inset-0 z-50 flex items-center justify-center p-4">
    <!-- Backdrop covers only the parent container -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" (click)="cancel.emit()"></div>

    <!-- Dialog card -->
    <div
      class="relative bg-white rounded-2xl shadow-2xl border border-planora-desert-200 p-6 w-full max-w-md space-y-5 animate-page-slide-up"
    >
      <div class="flex items-start gap-3">
        <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center shrink-0">
          <i class="pi pi-exclamation-triangle text-red-600"></i>
        </div>
        <div>
          <h3 class="text-lg font-bold text-planora-basalt-800">{{ title }}</h3>
          <p class="text-sm text-planora-basalt-500 mt-1">{{ message }}</p>
        </div>
      </div>

      <div class="flex justify-end gap-3">
        <button
          (click)="cancel.emit()"
          class="px-5 py-2.5 rounded-xl border border-planora-desert-200 text-planora-basalt-600 font-semibold text-sm hover:bg-planora-desert-50 transition-colors"
        >
          {{ cancelLabel }}
        </button>
        <button
          (click)="confirm.emit()"
          class="px-5 py-2.5 rounded-xl bg-red-600 text-white font-semibold text-sm hover:bg-red-700 transition-colors"
        >
          {{ confirmLabel }}
        </button>
      </div>
    </div>
  </div>
}
