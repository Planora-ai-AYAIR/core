<button
  [type]="type()"
  [disabled]="disabled() || isLoading()"
  [class]="buttonClass()"
  [attr.aria-label]="ariaLabel() || null"
>
  @if (isLoading()) {
    <span class="flex items-center justify-center gap-2">
      <i class="pi pi-spinner pi-spin" aria-hidden="true"></i>
      <span>{{ loadingText() }}</span>
    </span>
  } @else {
    <ng-content></ng-content>
    @if (text()) {
      {{ text() }}
    }
  }
</button>
