<div
  class="flex h-screen w-screen overflow-hidden font-sans antialiased relative bg-planora-limestone"
>
  <div class="topo-texture-layer"></div>

  <!-- Mobile backdrop (only when sidebar is open on small screens) -->
  @if (isSidebarMobileOpen()) {
    <div class="fixed inset-0 z-40 lg:hidden mobile-backdrop" (click)="toggleMobileSidebar()"></div>
  }

  <!-- Sidebar component: now controlled by inputs -->
  <app-sidebar
    [collapsed]="isSidebarCollapsed()"
    [mobileOpen]="isSidebarMobileOpen()"
    (collapsedChange)="onCollapsedChange($event)"
    (mobileOpenChange)="onMobileOpenChange($event)"
  ></app-sidebar>

  <!-- Main content area -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative z-10">
    <header
      class="h-20 min-h-20 border-b border-planora-desert-200/60 flex items-center justify-between px-8 backdrop-blur-md shadow-sm"
    >
      <div class="flex items-center gap-4">
        <!-- Hamburger for mobile -->
        <button
          (click)="toggleMobileSidebar()"
          class="lg:hidden p-2.5 -ml-2 rounded-xl hover:bg-planora-limestone border border-transparent hover:border-planora-desert-200 text-planora-basalt-700 transition-all focus:outline-none"
          aria-label="Toggle menu"
        >
          <i class="pi pi-bars text-xl"></i>
        </button>

        <div class="flex items-center gap-2 select-none">
          <span class="text-xs font-semibold uppercase tracking-widest text-planora-basalt-400"
            >Workspace</span
          >
          @for (crumb of breadcrumbs(); track crumb.label; let last = $last) {
            <span class="text-sm text-planora-desert-300">/</span>
            @if (crumb.route) {
              <!-- Clickable parent -->
              <a
                [routerLink]="crumb.route"
                class="text-sm font-semibold text-planora-basalt-800 hover:text-planora-clay-500 transition-colors"
              >
                {{ crumb.label }}
              </a>
            } @else {
              <!-- Current page (non‑clickable) -->
              <span class="text-sm font-semibold text-planora-basalt-800">{{ crumb.label }}</span>
            }
          }
        </div>
      </div>

      <div class="flex items-center gap-4">
        <button
          class="w-10 h-10 hidden sm:flex items-center justify-center rounded-xl border border-planora-desert-200 text-planora-basalt-500 hover:text-planora-clay-600 hover:bg-white transition-all shadow-sm"
        >
          <i class="pi pi-bell"></i>
        </button>

        <div
          class="flex items-center gap-3 pl-3 border-l border-planora-desert-200/60 cursor-pointer group"
        >
          @if (user.avatar) {
            <img
              [src]="user.avatar"
              alt="User avatar"
              class="w-9 h-9 rounded-xl object-cover border border-planora-desert-200 shadow-sm"
            />
          } @else {
            <div
              class="w-9 h-9 rounded-xl bg-gradient-to-br from-planora-clay-500 to-planora-clay-600 flex items-center justify-center text-xs font-bold text-white border border-planora-clay-400 shadow-sm transition-transform group-hover:scale-105 duration-200"
            >
              {{ user.name.charAt(0) }}
            </div>
          }
          <div class="hidden sm:flex flex-col text-left select-none">
            <span
              class="text-sm font-semibold text-planora-basalt-800 transition-colors group-hover:text-planora-clay-600"
              >{{ user.name }}</span
            >
            <span class="text-[10px] font-medium text-planora-basalt-400 -mt-0.5"
              >Geotechnical Lead</span
            >
          </div>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto content-view-container">
      <div class="w-full h-full">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
