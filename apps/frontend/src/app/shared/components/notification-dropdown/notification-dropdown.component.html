<!-- Bell button -->
<button
  (click)="toggleDropdown()"
  class="relative w-10 h-10 flex items-center justify-center text-planora-basalt-400 hover:text-planora-clay-600 hover:bg-planora-limestone-100/50 rounded-xl transition-all"
  title="Notifications"
>
  <i class="pi pi-bell text-lg"></i>
  @if (unreadCount(); as count) {
    <span
      class="absolute -top-1 -right-1 w-5 h-5 rounded-full bg-red-500 text-white text-[10px] font-bold flex items-center justify-center animate-pulse"
    >
      {{ count > 9 ? '9+' : count }}
    </span>
  }
</button>

<!-- Overlay (backdrop + panel) – animated with CSS -->
<div
  class="notification-overlay"
  [class.notification-overlay-visible]="open"
  [class.notification-overlay-hidden]="!open"
>
  <!-- Backdrop -->
  <div class="fixed inset-0 z-50 notification-backdrop" (click)="closeDropdown()"></div>

  <!-- Panel -->
  <div
    class="fixed z-50 notification-panel top-16 right-4 sm:right-8 w-[calc(100vw-2rem)] sm:w-80 max-w-sm bg-white rounded-xl shadow-2xl border border-planora-desert-200 p-4 space-y-3"
    (click)="$event.stopPropagation()"
  >
    <div class="flex items-center justify-between">
      <h3 class="text-sm font-bold text-planora-basalt-800">Notifications</h3>
      <button
        (click)="facade.markAllAsRead()"
        class="text-xs text-planora-clay-600 hover:underline"
      >
        Mark all read
      </button>
    </div>
    <div class="max-h-64 overflow-y-auto space-y-2">
      @if (facade.loading()) {
        <div class="flex items-center justify-center py-6">
          <i class="pi pi-spin pi-spinner text-lg text-planora-clay-500"></i>
        </div>
      } @else {
        @for (n of facade.notifications(); track n.id) {
          <div
            class="p-2 rounded-lg border transition-colors duration-200"
            [class.bg-planora-limestone]="!n.isRead"
            [class.border-planora-desert-100]="true"
          >
            <div class="flex items-start justify-between">
              <div class="text-xs font-semibold text-planora-basalt-800">{{ n.title }}</div>
              @if (!n.isRead) {
                <button
                  (click)="facade.markAsRead(n.id)"
                  class="text-[10px] text-planora-clay-600 hover:underline shrink-0 ml-2"
                >
                  Read
                </button>
              }
            </div>
            <div class="text-[11px] text-planora-basalt-500 mt-0.5">{{ n.message }}</div>
            <div class="text-[9px] text-planora-basalt-400 mt-1">
              {{ n.createdAt | date: 'short' }}
            </div>
          </div>
        } @empty {
          <div class="text-xs text-planora-basalt-400 py-4 text-center">No notifications</div>
        }
      }
    </div>
  </div>
</div>
