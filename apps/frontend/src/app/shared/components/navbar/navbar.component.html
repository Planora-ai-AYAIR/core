<!-- Header bar -->
<header
  class="fixed top-0 left-0 w-full z-50 bg-planora-limestone/95 backdrop-blur-md border-b border-planora-desert-200/60 transition-shadow duration-300"
  [class.shadow-lg]="isScrolled"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 lg:h-20">
      <!-- Logo -->
      <a [routerLink]="ROUTES.home" (click)="closeMenu()" class="flex items-center gap-2 group">
        <img
          src="/assets/images/logo/logo.png"
          alt="Planora Logo"
          class="h-16 w-auto lg:h-24 transition-transform duration-300 group-hover:scale-105"
        />
      </a>

      <!-- Desktop navigation -->
      <nav class="hidden lg:flex items-center gap-1 text-sm font-medium">
        @for (link of navLinks; track link.id) {
          <a
            (click)="scrollToSection(link.id)"
            [class.text-planora-clay-600]="activeLink === link.id"
            [class.text-planora-basalt-700]="activeLink !== link.id"
            class="cursor-pointer relative px-3 py-2 rounded-sm hover:text-planora-clay-500 transition-colors duration-200 before:absolute before:bottom-0 before:left-1/2 before:-translate-x-1/2 before:w-0 before:h-[2px] before:bg-planora-clay-500 before:transition-all before:duration-300 hover:before:w-full"
            [class.before:!w-full]="activeLink === link.id"
            [attr.aria-current]="activeLink === link.id ? 'page' : null"
          >
            {{ link.label }}
          </a>
        }
      </nav>

      <!-- Right side actions (desktop) -->
      <div class="hidden lg:flex items-center gap-4">
        <button
          (click)="OnLoginClicked()"
          class="px-5 py-2 text-sm font-semibold text-planora-basalt-700 border border-planora-basalt-300 rounded-sm hover:bg-planora-desert-100 transition-all duration-200 hover:border-planora-clay-300 hover:shadow-sm"
        >
          Sign In
        </button>
        <a
          routerLink="/analyse"
          class="px-5 py-2.5 text-sm font-semibold text-planora-limestone bg-planora-clay-500 rounded-sm shadow-md shadow-planora-clay-200/60 hover:bg-planora-clay-600 hover:shadow-lg hover:shadow-planora-clay-300/40 transition-all duration-200 active:scale-95"
        >
          Analyse Land
        </a>
      </div>

      <!-- Mobile hamburger -->
      <button
        (click)="toggleMenu()"
        class="lg:hidden p-2 -mr-2 text-planora-basalt-700 hover:text-planora-clay-500 focus:outline-none transition-colors duration-200"
        [attr.aria-expanded]="isMenuOpen"
        aria-label="Toggle menu"
      >
        <svg
          class="w-6 h-6 hamburger-icon"
          [class.rotate-90]="isMenuOpen"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          @if (!isMenuOpen) {
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          } @else {
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          }
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- Mobile menu overlay -->
@if (isMenuOpen) {
  <div
    class="fixed inset-0 z-40 bg-planora-limestone flex flex-col lg:hidden animate-fade-in"
    (click)="closeMenu()"
  >
    <div class="absolute inset-0 bg-planora-limestone/90 backdrop-blur-sm"></div>

    <nav class="relative flex flex-col p-6 pt-24 space-y-1 text-lg font-medium">
      @for (link of navLinks; track link.id; let i = $index) {
        <a
          (click)="scrollToSection(link.id)"
          [class.text-planora-clay-600]="activeLink === link.id"
          [class.text-planora-basalt-700]="activeLink !== link.id"
          class="py-3 px-4 rounded-sm hover:bg-planora-desert-100 transition-all duration-200 flex items-center gap-2 animate-slide-down"
          [style.animation-delay]="i * 50 + 'ms'"
        >
          @if (activeLink === link.id) {
            <span class="w-1.5 h-1.5 bg-planora-clay-500 rotate-45 inline-block"></span>
          }
          {{ link.label }}
        </a>
      }
    </nav>

    <div
      class="relative mt-auto p-6 border-t border-planora-desert-200/60 space-y-3 animate-slide-up"
    >
      <button
        (click)="OnLoginClicked(); closeMenu()"
        class="w-full py-3 text-center text-planora-basalt-700 border border-planora-basalt-300 rounded-sm hover:bg-planora-desert-100 transition-all duration-200 hover:border-planora-clay-300"
      >
        Sign In
      </button>
      <a
        routerLink="/analyse"
        (click)="closeMenu()"
        class="block w-full py-3.5 text-center font-semibold text-planora-limestone bg-planora-clay-500 rounded-sm shadow-md hover:bg-planora-clay-600 hover:shadow-lg transition-all duration-200 active:scale-95"
      >
        Analyse Your Land
      </a>
    </div>
  </div>
}
