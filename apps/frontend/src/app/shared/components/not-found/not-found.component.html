<div class="min-h-screen flex items-center justify-center bg-planora-limestone px-6">
  <div class="text-center max-w-lg mx-auto">
    <!-- Large 404 number -->
    <p class="text-8xl lg:text-9xl font-display font-bold text-planora-clay-500 mb-10">
      4<i class="pi pi-compass text-6xl text-planora-clay-800 animate-spin-slow"></i>4
    </p>

    <h1 class="text-2xl sm:text-3xl font-display font-bold text-planora-basalt-900 mb-4">
      You've drifted off the map.
    </h1>
    <p class="text-base text-planora-basalt-600 mb-8 leading-relaxed">
      The page you're looking for doesn't exist or has moved. Let's get you back to familiar ground.
    </p>

    <!-- Buttons -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <app-button variant="primary" size="lg" [routerLink]="[ROUTES.home]">
        <i class="pi pi-home mr-2"></i> Go to Homepage
      </app-button>

      <app-button variant="outline" size="lg" [routerLink]="[ROUTES.analysis]">
        <i class="pi pi-map mr-2"></i> Analyse Land
      </app-button>
    </div>

    <!-- Subtle help links -->
    <p class="mt-8 text-sm text-planora-basalt-500">
      Need help?
      <a href="#" class="underline hover:text-planora-clay-600">Contact support</a>
    </p>
  </div>
</div>
