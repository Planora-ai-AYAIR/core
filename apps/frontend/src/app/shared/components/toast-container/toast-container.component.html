<div class="fixed top-5 right-5 z-[9999] flex flex-col gap-3 w-80">
  @if (toast) {
    <div
      class="relative overflow-hidden rounded-md bg-planora-gypsum border border-planora-desert-200 shadow-lg shadow-planora-basalt-900/5 animate-slideIn"
    >
      <div
        class="flex items-start gap-3 pl-4 pr-3 py-3 border-l-4"
        [ngClass]="accentClass(toast.type)"
      >
        <span
          class="mt-0.5 shrink-0"
          [ngClass]="iconColorClass(toast.type)"
          [innerHTML]="iconSvg(toast.type)"
        ></span>

        <p class="flex-1 text-sm leading-snug text-planora-basalt-800 font-medium pt-0.5">
          {{ toast.message }}
        </p>

        <button
          type="button"
          (click)="dismiss()"
          aria-label="Dismiss notification"
          class="shrink-0 text-planora-basalt-500 hover:text-planora-basalt-800 transition-colors p-0.5 -m-0.5"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            stroke-width="2"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Instrument-scale decay bar: reads like a survey gauge winding down -->
      <div class="h-[3px] w-full bg-planora-desert-100">
        <div
          class="h-full origin-left"
          [ngClass]="accentBgClass(toast.type)"
          [style.animation]="'shrinkBar ' + (toast.duration ?? 6000) + 'ms linear forwards'"
        ></div>
      </div>
    </div>
  }
</div>
