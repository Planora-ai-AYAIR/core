name: Deploy — Infra & K8s

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        working-directory: infra/terraform
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name planora-eks-production

      - name: Apply K8s manifests
        run: |
          kubectl apply -f infra/k8s/api-dotnet/
          kubectl apply -f infra/k8s/ai-python/
          kubectl apply -f infra/k8s/frontend/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/planora-api --timeout=120s
          kubectl rollout status deployment/planora-ai --timeout=120s
          kubectl rollout status deployment/planora-frontend --timeout=120s
