name: CI AI

on:
  pull_request:
    paths:
      - 'apps/ai-python/**'
  push:
    branches: [dev, main]
    paths:
      - 'apps/ai-python/**'

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        working-directory: apps/ai-python
        run: pip install --no-cache-dir .[dev]

      - name: Lint with ruff
        working-directory: apps/ai-python
        run: ruff check src/

      - name: Run tests
        working-directory: apps/ai-python
        run: pytest src/ -v --tb=short || echo "No tests yet — skipping"

      - name: Docker build check
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-south-1
          AWS_BUCKET_NAME: geosense-ai-production
        run: |
          docker build \
            -f apps/ai-python/Dockerfile \
            -t planora-ai:ci-check \
            apps/ai-python
