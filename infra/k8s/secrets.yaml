# IMPORTANT: Never commit real values to version control.
# This file is a TEMPLATE only — replace ALL placeholder values before applying.
#
# Recommended secret management options:
#   1. Sealed Secrets: https://github.com/bitnami-labs/sealed-secrets
#   2. external-secrets operator with AWS Secrets Manager
#
# Apply with: kubectl apply -f infra/k8s/secrets.yaml
#
# After Terraform apply, retrieve real values with:
#   terraform -chdir=infra/terraform/s3 output -raw iam_access_key_id
#   terraform -chdir=infra/terraform/s3 output -raw iam_secret_access_key
#   terraform -chdir=infra/terraform/s3 output -raw bucket_name
apiVersion: v1
kind: Secret
metadata:
  name: planora-secrets
type: Opaque
stringData:
  # ── Database ────────────────────────────────────────────────────────────
  db-connection-string: "Server=YOUR_RDS_ENDPOINT;Database=PlanoraProd;User Id=planora_admin;Password=YOUR_PASSWORD;"

  # ── Redis ───────────────────────────────────────────────────────────────
  redis-connection-string: "YOUR_ELASTICACHE_ENDPOINT:6379"
  redis-url: "redis://YOUR_ELASTICACHE_ENDPOINT:6379"

  # ── AWS S3 (GeoSense geospatial output storage) ─────────────────────────
  # Values come from: terraform -chdir=infra/terraform/s3 output
  aws-access-key-id: "YOUR_IAM_ACCESS_KEY_ID"
  aws-secret-access-key: "YOUR_IAM_SECRET_ACCESS_KEY"
  aws-region: "eu-south-1"
  aws-bucket-name: "geosense-ai-production"
