apiVersion: v1
kind: Service
metadata:
  name: api-dotnet
  namespace: planora
  labels:
    app: api-dotnet
spec:
  selector:
    app: api-dotnet
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
# External LoadBalancer for the API (use AWS ALB Ingress Controller in prod instead)
apiVersion: v1
kind: Service
metadata:
  name: api-dotnet-lb
  namespace: planora
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  selector:
    app: api-dotnet
  ports:
    - name: https
      protocol: TCP
      port: 443
      targetPort: 8080
  type: LoadBalancer
