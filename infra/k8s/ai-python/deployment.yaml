apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-python
  namespace: planora
  labels:
    app: ai-python
    project: planora-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-python
  template:
    metadata:
      labels:
        app: ai-python
    spec:
      containers:
        - name: ai-python
          # Replace with your ECR image URI
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/planora/ai-python:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: planora-s3-secret
                  key: AWS_BUCKET_NAME
            # AI service receives the API key via env for self-authentication
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: planora-ai-secret
                  key: AIOPTIONS__APIKEY
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
