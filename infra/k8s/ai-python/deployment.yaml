---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-python-config
  namespace: planora
  labels:
    app: ai-python
data:
  REDIS_URL: "redis://redis:6379"
  LOCAL_OUT_DIR: "/tmp/planora"
  EGYPT_BBOX: "[24.0, 22.0, 37.0, 32.0]"
  API_TITLE: "Planora AI Engine"
  API_VERSION: "1.0.0"
  GEE_PROJECT: "planora-497015"
  GEE_SERVICE_ACCOUNT_EMAIL: "planora@planora-497015.iam.gserviceaccount.com"
  GEE_SERVICE_ACCOUNT_KEY: "/app/secrets/planora_gee.json"
  WEBHOOK_URL: "https://n8ng4pqeob.execute-api.us-east-1.amazonaws.com/v1/api/webhooks/ai-events"
---
# The "ai-python-gee" Secret (real GEE service-account key) is created
# out-of-band, NOT from this file — kubectl apply re-applies this file on
# every deploy, so a placeholder Secret here would overwrite the live key
# with empty data each time. Create it once per cluster with:
#   kubectl create secret generic ai-python-gee -n planora \
#     --from-file=planora_gee.json=apps/ai-python/secrets/planora_gee.json
#
# The "ai-python-webhook" Secret holds the HMAC shared secret for webhook
# signing. Create it once per cluster with:
#   kubectl create secret generic ai-python-webhook -n planora \
#     --from-literal=WEBHOOK_SECRET='<the-shared-secret>'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-python
  namespace: planora
  labels:
    app: ai-python
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: ai-python
  template:
    metadata:
      labels:
        app: ai-python
    spec:
      containers:
        - name: ai-python
          image: ghcr.io/planora-ai-ayair/planora-ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: ai-python-config
          env:
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-python-webhook
                  key: WEBHOOK_SECRET
                  optional: true
          volumeMounts:
            - name: gee-key
              mountPath: /app/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
      volumes:
        - name: gee-key
          secret:
            secretName: ai-python-gee
---
apiVersion: v1
kind: Service
metadata:
  name: ai-python
  namespace: planora
  labels:
    app: ai-python
spec:
  type: ClusterIP
  selector:
    app: ai-python
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
# Public NLB for ai-python — mirrors api-dotnet-lb / frontend-lb.
# NOTE: app/main.py has no auth on any route (no API key / JWT check), so
# every endpoint, including GEE-backed analysis and S3 writes, is open to
# whoever has this URL. Consider an API-key gate before relying on this
# for anything beyond docs/demo access.
apiVersion: v1
kind: Service
metadata:
  name: ai-python-lb
  namespace: planora
  labels:
    app: ai-python
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  selector:
    app: ai-python
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
